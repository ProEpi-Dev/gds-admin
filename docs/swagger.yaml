      parameters:
        - name: page
          required: false
          in: query
          description: Número da página
          schema:
            minimum: 1
            default: 1
            example: 1
            type: number
        - name: pageSize
          required: false
          in: query
          description: Tamanho da página
          schema:
            minimum: 1
            maximum: 100
            default: 20
            example: 20
            type: number
        - name: active
          required: false
          in: query
          description: Filtrar por status ativo
          schema:
            example: true
            type: boolean
        - name: search
          required: false
          in: query
          description: Buscar por nome ou email
          schema:
            example: joao
            type: string
      responses:
        '200':
          description: Lista de usuários
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseDto'
