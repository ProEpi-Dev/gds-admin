openapi: 3.0.0
info:
  title: Vigilância Participativa API
  description: API REST para o backend do Guardiões da Saúde - Vigilância Participativa em Saúde Pública.
  version: 1.0.0
  contact: {}
servers:
  - url: http://localhost:3000/v1
    description: Local (prefixo /v1)
  - url: https://devapi.gds.proepi.org.br/v1
    description: Desenvolvimento
  - url: https://api.gds.proepi.org.br/v1
    description: Produção
tags: []
paths:
  /v1/health:
    get:
      description: Verifica o status da aplicação e conexão com o banco de dados
      operationId: AppController_getHealth
      parameters: []
      responses:
        '200':
          description: Aplicação está funcionando corretamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    example: '2024-01-01T00:00:00.000Z'
                  database:
                    type: string
                    example: connected
                  uptime:
                    type: number
                    example: 12345
      summary: Health check
      tags:
        - Health
  /v1/auth/login:
    post:
      operationId: AuthController_login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDto'
        '401':
          description: Credenciais inválidas
      summary: Autenticar usuário
      tags: &ref_0
        - Authentication
  /v1/auth/refresh:
    post:
      description: Envia o refresh token para obter um novo JWT e um novo refresh token (rotação).
      operationId: AuthController_refresh
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenBodyDto'
      responses:
        '200':
          description: Novos tokens emitidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponseDto'
        '401':
          description: Refresh token inválido ou expirado
      summary: Renovar access token
      tags: *ref_0
  /v1/auth/logout:
    post:
      description: Revoga o refresh token informado. O JWT de acesso continua válido até expirar.
      operationId: AuthController_logout
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenBodyDto'
      responses:
        '204':
          description: Refresh token revogado
      summary: Encerrar sessão (refresh)
      tags: *ref_0
  /v1/auth/change-password:
    patch:
      description: Permite que o usuário autenticado altere sua própria senha
      operationId: AuthController_changePassword
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordDto'
      responses:
        '204':
          description: Senha alterada com sucesso
        '400':
          description: Dados inválidos ou nova senha igual à atual
        '401':
          description: Senha atual incorreta ou usuário não autenticado
      security:
        - bearerAuth: []
      summary: Alterar senha do usuário logado
      tags: *ref_0
  /v1/auth/forgot-password:
    post:
      description: Envia um email com link para redefinir a senha. Sempre retorna sucesso para não revelar se o email existe.
      operationId: AuthController_forgotPassword
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordDto'
      responses:
        '200':
          description: Se o email estiver cadastrado, as instruções serão enviadas
      summary: Solicitar redefinição de senha
      tags: *ref_0
  /v1/auth/reset-password:
    post:
      description: Redefine a senha usando o token recebido por email.
