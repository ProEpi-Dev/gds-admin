      summary: Atualizar usuário
      tags: *ref_5
    delete:
      description: 'Admin: qualquer usuário. Manager: apenas usuários que participam dos seus contextos. Ativo: desativa; inativo: exclusão permanente se não houver dependências.'
      operationId: UsersController_remove
      parameters:
