  /v1/syndromic-classification/reports/bi-export-scores:
    get:
      description: |-
        Autenticação por chave de API (cabeçalho `x-api-key`, formato `publicId.secret` gerado no painel). O `contextId` na URL é opcional quando a chave já está vinculada a um contexto; se informado, deve coincidir com o da chave.

        Modos:
        - `onlySymptoms=true`: uma linha por `report` apenas com sintoma/local/demografia (limite = reports distintos).
        - `topScore=true`: uma linha por `report` com a síndrome de maior score acima do limiar; reports sem nenhum score acima do limiar voltam com `sindrome_codigo: null`. Mutuamente exclusivo com `onlySymptoms`.
        - Em todos os modos o payload inclui `totals` com contagem de reports POSITIVE/NEGATIVE no contexto/intervalo e quebra `by_day`.
        - Cada linha inclui `usuario_ref` e `participacao_ref`: pseudônimos HMAC-SHA256 estáveis (escopo do contexto) que permitem `COUNT(DISTINCT)` por pessoa/participação sem expor IDs internos. Veja documentação de integração BI para implicações de LGPD e rotação de chave.
      operationId: SyndromicClassificationController_getBiExportSyndromeScores
      parameters:
        - name: startDate
          required: true
          in: query
          schema:
            example: '2026-01-01'
            type: string
        - name: endDate
          required: true
          in: query
          schema:
            example: '2026-01-31'
            type: string
        - name: contextId
          required: false
          in: query
          description: Opcional se a chave de API já estiver vinculada a um contexto; caso contrário, obrigatório.
          schema:
            example: 12
            type: number
        - name: syndromeId
          required: false
          in: query
          schema:
            type: number
        - name: reportId
          required: false
          in: query
          schema:
            type: number
        - name: processingStatus
          required: false
          in: query
          schema:
            type: string
            enum:
              - processed
              - skipped
              - failed
        - name: isAboveThreshold
          required: false
          in: query
          description: Filtra por is_above_threshold (true = acima do limiar)
          schema:
            type: boolean
        - name: onlyLatest
          required: false
          in: query
          schema:
            default: true
            type: boolean
        - name: h3Resolution
          required: false
          in: query
          description: Resolução H3 da coluna `location_index` (padrão 8)
          schema:
            minimum: 0
            maximum: 15
            default: 8
            type: number
        - name: onlySymptoms
          required: false
          in: query
          description: Se true, devolve uma linha por report, só com localização, demografia e `sintomas_codigos` (união de todos os matches); sem colunas de score/síndrome por linha.
          schema:
            default: false
            type: boolean
        - name: topScore
          required: false
          in: query
          description: 'Se true, devolve uma linha por report. Quando o report tiver pelo menos uma classificação acima do limiar, escolhe a síndrome com maior score; caso contrário devolve `sindrome_codigo: null`. Mutuamente exclusivo com `onlySymptoms`.'
          schema:
            default: false
            type: boolean
        - name: x-api-key
          in: header
          description: Chave de API (formato publicId.secret) criada no painel; autentica o contexto vinculado
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ''
      security: *ref_16
      summary: Export de scores (JSON com H3) para consumo em ferramentas de BI
      tags: *ref_17
