components:
  securitySchemes:
    bearerAuth:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Token JWT no formato Bearer
  schemas:
    LoginDto:
      type: object
      properties:
        email:
          type: string
          description: Email do usuário
          example: user@example.com
        password:
          type: string
          description: Senha do usuário
          example: password123
          minLength: 6
      required:
        - email
        - password
    UserResponseDto:
      type: object
      properties:
        id:
          type: number
          description: ID do usuário
          example: 1
        name:
          type: string
          description: Nome do usuário
          example: João Silva
        email:
          type: string
          description: Email do usuário
          example: joao@example.com
        active:
          type: boolean
          description: Status ativo
          example: true
        genderId:
          type: number
          description: ID do gênero
          example: 1
        locationId:
          type: number
          description: ID da localização
          example: 150
        countryLocationId:
          type: number
          description: ID da localização de país
          example: 10
        externalIdentifier:
          type: string
          description: Identificador externo
          example: '12345678900'
        phone:
          type: string
          description: Telefone
          example: '+2389912345'
        roleId:
          type: number
          description: ID do papel global
          example: 1
        roleName:
          type: string
          description: Nome do papel global
          example: Administrador
        createdAt:
          format: date-time
          type: string
          description: Data de criação
          example: '2024-01-01T00:00:00.000Z'
        updatedAt:
          format: date-time
          type: string
          description: Data de atualização
          example: '2024-01-01T00:00:00.000Z'
      required:
        - id
        - name
        - email
        - active
        - createdAt
        - updatedAt
    ContextInfoDto:
      type: object
      properties:
        id:
          type: number
          description: ID do contexto
          example: 1
        name:
          type: string
          description: Nome do contexto
          example: Contexto de Saúde Pública
        modules:
          type: array
          description: Módulos habilitados no contexto
          example:
            - self_health
          items:
            type: string
            enum:
              - self_health
              - community_signal
      required:
        - id
        - name
    ParticipationLoginDto:
      type: object
      properties:
        id:
          type: number
          description: ID da participação
          example: 1
        userId:
          type: number
          description: ID do usuário
          example: 1
        context:
          description: Contexto da participação
          allOf:
            - $ref: '#/components/schemas/ContextInfoDto'
        startDate:
          type: string
          description: Data de início da participação
          example: '2024-01-01'
          format: date
        endDate:
          type: string
          description: Data de término da participação
          example: '2024-12-31'
          format: date
        active:
          type: boolean
          description: Status ativo
          example: true
        createdAt:
          format: date-time
          type: string
          description: Data de criação
          example: '2024-01-01T00:00:00.000Z'
        updatedAt:
          format: date-time
          type: string
          description: Data de atualização
          example: '2024-01-01T00:00:00.000Z'
      required:
        - id
        - userId
        - context
        - startDate
        - active
        - createdAt
        - updatedAt
    FormVersionResponseDto:
      type: object
      properties:
        id:
          type: number
          description: ID da versão do formulário
          example: 1
        formId:
          type: number
          description: ID do formulário
          example: 1
        versionNumber:
          type: number
          description: Número da versão
          example: 1
        accessType:
          type: string
          description: Tipo de acesso da versão
          enum:
            - PUBLIC
            - PRIVATE
          example: PUBLIC
        definition:
          type: object
          description: Definição do formulário (JSON)
          example:
            fields:
              - name: campo1
                type: text
        active:
          type: boolean
          description: Status ativo
          example: true
        createdAt:
          format: date-time
          type: string
          description: Data de criação
          example: '2024-01-01T00:00:00.000Z'
        updatedAt:
          format: date-time
          type: string
          description: Data de atualização
          example: '2024-01-01T00:00:00.000Z'
        passingScore:
          type: number
          description: Nota mínima para aprovação (0-100)
          example: 70
        maxAttempts:
          type: number
          description: Limite de tentativas (NULL = ilimitado)
          example: 3
        timeLimitMinutes:
          type: number
          description: Tempo limite em minutos (NULL = sem limite)
          example: 30
        showFeedback:
          type: boolean
          description: Mostrar feedback após resposta
          example: true
          default: true
        randomizeQuestions:
          type: boolean
          description: Randomizar ordem das questões
          example: false
          default: false
      required:
        - id
        - formId
        - versionNumber
        - accessType
        - definition
        - active
        - createdAt
        - updatedAt
    DefaultFormDto:
      type: object
      properties:
        formId:
          type: number
          description: ID do formulário
          example: 1
        formTitle:
          type: string
          description: Título do formulário
          example: Formulário de Sinal
        formReference:
          type: string
          description: Referência do formulário
          example: DEFAULT_SIGNAL_FORM
        version:
          description: Versão ativa mais recente do formulário
          nullable: true
          allOf:
            - $ref: '#/components/schemas/FormVersionResponseDto'
      required:
        - formId
        - formTitle
        - version
    LoginResponseDto:
      type: object
      properties:
        token:
          type: string
          description: Token JWT de autenticação (acesso)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: Refresh token opaco; use em POST /v1/auth/refresh quando o JWT expirar
          example: a1b2c3d4e5f6...
        user:
          description: Dados do usuário autenticado
          allOf:
            - $ref: '#/components/schemas/UserResponseDto'
        participation:
          description: Participação ativa do usuário
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ParticipationLoginDto'
        defaultForms:
          description: Formulários padrão (DEFAULT_SIGNAL_FORM e DEFAULT_QUIZ_FORM)
          type: array
          items:
            $ref: '#/components/schemas/DefaultFormDto'
      required:
        - token
        - refreshToken
        - user
    RefreshTokenBodyDto:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh token recebido no login ou signup
          example: a1b2c3...
      required:
        - refreshToken
    RefreshResponseDto:
      type: object
      properties:
        token:
          type: string
          description: Novo JWT de acesso
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: Novo refresh token (rotação)
          example: a1b2c3...
      required:
        - token
        - refreshToken
    ChangePasswordDto:
      type: object
      properties:
        currentPassword:
          type: string
          description: Senha atual do usuário
          example: senhaAtual123
        newPassword:
          type: string
          description: Nova senha do usuário
          example: novaSenha123
          minLength: 8
      required:
        - currentPassword
        - newPassword
    ForgotPasswordDto:
      type: object
      properties:
        email:
          type: string
          description: Email do usuário para envio do link de redefinição
          example: usuario@example.com
      required:
        - email
    ResetPasswordDto:
      type: object
      properties:
        token:
          type: string
          description: Token de redefinição recebido por email
          example: abc123...
        newPassword:
          type: string
          description: Nova senha do usuário
          example: novaSenha123
          minLength: 8
      required:
        - token
        - newPassword
    SignupDto:
      type: object
      properties:
        name:
          type: string
          description: Nome completo do usuário
          example: Maria Santos
        email:
          type: string
          description: Email do usuário
          example: maria@example.com
        password:
          type: string
          description: Senha do usuário
          example: senha123
          minLength: 6
        contextId:
          type: number
          description: ID do contexto público que o usuário deseja participar
          example: 1
        acceptedLegalDocumentIds:
          description: IDs dos documentos legais aceitos pelo usuário
          example:
            - 1
            - 2
          type: array
          items:
            type: number
      required:
        - name
        - email
        - password
        - contextId
        - acceptedLegalDocumentIds
    SignupResponseDto:
      type: object
      properties:
        user:
          description: Dados do usuário criado
          allOf:
            - $ref: '#/components/schemas/UserResponseDto'
        emailVerificationRequired:
          type: boolean
          description: Quando true, o contexto exige confirmação de email; accessToken e refreshToken não são emitidos até a verificação.
        accessToken:
          type: string
          description: Token de acesso JWT (omitido se emailVerificationRequired)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: Refresh token opaco (omitido se emailVerificationRequired)
          example: a1b2c3d4e5f6...
        participation:
          description: Participação criada (mesmo formato do login, incluindo nome do contexto)
          allOf:
            - $ref: '#/components/schemas/ParticipationLoginDto'
      required:
        - user
        - participation
    VerifyEmailDto:
      type: object
      properties:
        token:
          type: string
          description: Token recebido por email
      required:
        - token
    RequestEmailVerificationDto:
      type: object
      properties:
        email:
          type: string
          description: Email da conta a confirmar
      required:
        - email
    LegalDocumentResponseDto:
      type: object
      properties:
        id:
          type: number
          description: ID do documento
          example: 1
        typeId:
          type: number
          description: ID do tipo de documento
          example: 1
        typeCode:
          type: string
          description: Código do tipo de documento
          example: TERMS_OF_USE
        typeName:
          type: string
          description: Nome do tipo de documento
          example: Termos de Uso
        isRequired:
          type: boolean
          description: Indica se o aceite é obrigatório
          example: true
        version:
          type: string
          description: Versão do documento
          example: '1.0'
        title:
          type: string
          description: Título do documento
          example: Termos de Uso da Plataforma
        content:
          type: string
          description: Conteúdo completo do documento
          example: Este documento estabelece os termos...
        effectiveDate:
          type: string
          description: Data efetiva do documento
          example: '2026-01-01'
        active:
          type: boolean
          description: Status ativo
          example: true
        createdAt:
          format: date-time
          type: string
          description: Data de criação
          example: '2026-01-16T10:00:00Z'
        updatedAt:
          format: date-time
          type: string
          description: Data de atualização
          example: '2026-01-16T10:00:00Z'
      required:
        - id
        - typeId
        - typeCode
        - typeName
        - isRequired
        - version
        - title
        - content
        - effectiveDate
        - active
        - createdAt
        - updatedAt
    LegalDocumentTypeResponseDto:
      type: object
      properties:
        id:
          type: number
          description: ID do tipo de documento
          example: 1
        code:
          type: string
          description: Código único do tipo
          example: TERMS_OF_USE
        name:
          type: string
          description: Nome do tipo de documento
          example: Termos de Uso
        description:
          type: string
          description: Descrição do tipo de documento
          example: Termos e condições de uso da plataforma
        isRequired:
          type: boolean
          description: Indica se o aceite é obrigatório no signup
          example: true
        active:
          type: boolean
          description: Status ativo
          example: true
        createdAt:
          format: date-time
          type: string
          description: Data de criação
          example: '2026-01-16T10:00:00Z'
        updatedAt:
          format: date-time
          type: string
          description: Data de atualização
          example: '2026-01-16T10:00:00Z'
      required:
        - id
        - code
        - name
        - isRequired
        - active
        - createdAt
        - updatedAt
    CreateLegalDocumentDto:
      type: object
      properties:
        typeId:
          type: number
          description: ID do tipo de documento legal
          example: 1
        version:
          type: string
          description: Número da versão
          example: '1.0'
        title:
          type: string
          description: Título do documento
          example: Termos de Uso v1.0
        content:
          type: string
          description: Conteúdo HTML do documento
          example: <p>Termos e condições...</p>
        effectiveDate:
          type: string
          description: Data de vigência do documento
          example: '2026-01-18'
        active:
          type: boolean
          description: Indica se o documento está ativo
          example: true
          default: true
      required:
        - typeId
        - version
        - title
        - content
        - effectiveDate
        - active
    UpdateLegalDocumentDto:
      type: object
      properties:
        typeId:
          type: number
          description: ID do tipo de documento legal
          example: 1
        version:
          type: string
          description: Número da versão
          example: '2.0'
        title:
          type: string
          description: Título do documento
          example: Termos de Uso v2.0
        content:
          type: string
          description: Conteúdo HTML do documento
          example: <p>Termos e condições atualizados...</p>
        effectiveDate:
          type: string
          description: Data de vigência do documento
          example: '2026-02-01'
        active:
          type: boolean
          description: Indica se o documento está ativo
          example: false
    CreateLegalDocumentTypeDto:
      type: object
      properties:
        code:
          type: string
          description: Código único do tipo de documento
          example: TERMS_OF_USE
          maxLength: 50
        name:
          type: string
          description: Nome do tipo de documento
          example: Termos de Uso
          maxLength: 100
        description:
          type: string
          description: Descrição do tipo de documento
          example: Termos e condições de uso da plataforma
