      summary: '[Admin] Criar documento legal'
      tags: *ref_3
  /v1/admin/legal-documents/{id}:
    get:
      description: Retorna um documento legal específico por ID
      operationId: LegalDocumentsAdminController_findOneDocument
      parameters:
        - name: id
          required: true
          in: path
          description: ID do documento legal
