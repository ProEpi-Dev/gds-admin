  /v1/track-cycles/{id}/schedules:
    put:
      description: Remove agendamentos anteriores do ciclo e grava os informados. Datas opcionais por seção/sequência herdam o nível superior (ciclo → seção → item). Corpo idempotente. Compatível com camelCase (sectionSchedules, sectionId, startDate) ou snake_case (section_schedules, section_id, start_date), como no JSON do GET.
      operationId: TrackCyclesController_replaceSchedules
      parameters:
        - name: id
          required: true
          in: path
          description: ID do ciclo
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceTrackCycleSchedulesDto'
      responses:
        '200':
          description: Ciclo com agendamentos atualizados
      security: *ref_42
      summary: Substituir agendamentos de seções e conteúdos do ciclo
      tags: *ref_43
  /v1/track-cycles/{id}/status:
    patch:
      description: Altera o status de um ciclo (draft, active, closed, archived). Requer permissão de administrador.
      operationId: TrackCyclesController_updateStatus
      parameters:
        - name: id
          required: true
          in: path
          description: ID do ciclo
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrackCycleStatusDto'
      responses:
        '200':
          description: Status alterado com sucesso
        '404':
          description: Ciclo não encontrado
        '409':
          description: Já existe outro ciclo ativo para esta trilha/contexto
      security: *ref_42
      summary: Alterar status do ciclo
      tags: *ref_43
  /v1/genders:
