      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEmailVerificationDto'
      responses:
        '200':
          description: ''
      summary: Solicitar reenvio do email de confirmação
      tags: *ref_0
