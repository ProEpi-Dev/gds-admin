# Projeto no SonarQube (crie com a mesma chave na UI ou ajuste aqui)
sonar.projectKey=gds-backend
sonar.projectName=GDS Backend

sonar.host.url=https://sonarqube.maolabs.com.br

sonar.sources=src
sonar.tests=src,test
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts

sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
