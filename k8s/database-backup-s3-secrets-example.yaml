# Exemplo de credenciais para backup em S3 (compatível com `database-backup-s3-job-example.yaml`).
# Ajuste os valores e aplique antes do Job:
#   kubectl apply -f database-backup-s3-secrets-example.yaml
#
# O Job espera o Secret `gds-db-backup-s3` no namespace `gds`.
# Chaves obrigatórias: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, S3_BUCKET.
# Região: use AWS_DEFAULT_REGION ou AWS_REGION (pelo menos uma deve existir no Secret).
#
# O prefixo “pasta” no S3 não fica neste Secret — defina no Job em `S3_PREFIX` (value),
# para evitar erro quando não houver prefixo (omitir chave no Secret quebra o Pod).
#
# Em EKS, prefira IRSA e remova AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY deste Secret.
#
# Opcional — Healthchecks.io (https://hc-ping.com/): o Job envia /start, sucesso (URL base)
# ou /fail. Crie um check, copie o UUID da URL de ping. Sem a chave, nada é enviado.
# Com /start, configure Grace acima do tempo máximo do backup; veja a documentação do site.

apiVersion: v1
kind: Secret
metadata:
  name: gds-db-backup-s3
  namespace: gds
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: change-me
  AWS_SECRET_ACCESS_KEY: change-me
  AWS_DEFAULT_REGION: sa-east-1
  S3_BUCKET: change-me-backup-bucket
  # Descomente e substitua pelo UUID do seu check (só o identificador, não a URL inteira).
  # HEALTHCHECKS_UUID: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
