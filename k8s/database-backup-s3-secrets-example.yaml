# Exemplo de credenciais para backup em S3 (compatível com `database-backup-s3-job-example.yaml`).
# Ajuste os valores e aplique antes do Job:
#   kubectl apply -f database-backup-s3-secrets-example.yaml
#
# Em clusters AWS (EKS), prefira IRSA: ServiceAccount com annotation
# `eks.amazonaws.com/role-arn` e remova AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY deste Secret.

apiVersion: v1
kind: Secret
metadata:
  name: gds-db-backup-s3
  namespace: gds
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: change-me
  AWS_SECRET_ACCESS_KEY: change-me
  AWS_DEFAULT_REGION: sa-east-1
  S3_BUCKET: change-me-backup-bucket
  # Prefixo “pasta” no bucket (deixe vazio ou termine com /)
  S3_PREFIX: gds/postgres-oltp/
