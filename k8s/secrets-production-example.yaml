# Exemplo de secrets para produção
# IMPORTANTE: Atualize todos os valores antes de aplicar em produção!

apiVersion: v1
kind: Secret
metadata:
  name: gds-secrets
  namespace: gds
type: Opaque
stringData:
  # Database configuration (utilizado pelo backend e pelo postgres-oltp)
  DB_NAME: app
  DB_USER: app
  DB_PASS: change-me
  DATABASE_URL: postgresql://app:change-me@postgres-oltp:5432/app?schema=public

  # Backend configuration
  JWT_SECRET: change-me
  JWT_EXPIRES_IN: 7d
  JWT_REFRESH_EXPIRES_IN: 7d

---
# Credenciais SMTP e URL pública do frontend (links em e-mail, ex.: "esqueci minha senha").
# Referenciado em backend-deployment.yaml como secretKeyRef name: mail-credentials
apiVersion: v1
kind: Secret
metadata:
  name: mail-credentials
  namespace: gds
type: Opaque
stringData:
  MAILER_SMTP_ADDRESS: smtp.example.com
  MAILER_EMAIL: noreply@example.com
  MAILER_PASSWORD: change-me
  MAILER_SMTP_PORT: "587"
  # URL base do app (admin ou público) usada nos links dos e-mails
  FRONTEND_URL: https://gds.example.com

---
apiVersion: v1
kind: Secret
metadata:
  name: gds-frontend-secrets
  namespace: gds
type: Opaque
stringData:
  # URL base utilizada no build do frontend
  VITE_API_BASE_URL: https://api.gds.local
