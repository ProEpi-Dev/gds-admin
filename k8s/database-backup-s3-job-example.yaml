# Job de exemplo: dump lógico do PostgreSQL (postgres-oltp) e upload para S3.
#
# Pré-requisitos:
#   1. Secret `gds-secrets` com DB_USER, DB_PASS, DB_NAME (igual ao restante do stack).
#   2. Secret `gds-db-backup-s3` — ver `database-backup-s3-secrets-example.yaml`.
#
# Execução única (gerar nome novo a cada run; Jobs são imutáveis):
#   kubectl apply -f database-backup-s3-job-example.yaml
#
# Se o Job já existir com o mesmo nome, apague antes de reaplicar:
#   kubectl delete job database-backup-s3 -n gds
#
# Para agendamento (diário, etc.), copie o spec para um CronJob e use
# `successfulJobsHistoryLimit` / `failedJobsHistoryLimit` conforme a política do cluster.
#
# Nota: a imagem instala o cliente AWS em runtime (`apk add`). Em produção, use uma imagem
# corporativa já com `pg_dump` + `aws`, ou IRSA no EKS sem chaves estáticas.

apiVersion: batch/v1
kind: Job
metadata:
  name: database-backup-s3
  namespace: gds
  labels:
    app: database-backup-s3
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: database-backup-s3
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-database
          image: postgres:15-alpine
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h postgres-oltp -p 5432 -U "$DB_USER" -d "$DB_NAME"; do
                echo "Waiting for database to be ready..."
                sleep 2
              done
              echo "Database is ready."
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: gds-secrets
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: gds-secrets
                  key: DB_NAME
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      containers:
        - name: pg-dump-s3-upload
          image: postgres:15-alpine
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              apk add --no-cache aws-cli >/dev/null
              export PGPASSWORD="$DB_PASS"
              STAMP=$$(date +%Y%m%d-%H%M%S)
              DUMP="/tmp/app-$${STAMP}.sql.gz"
              echo "Running pg_dump..."
              pg_dump -h postgres-oltp -p 5432 -U "$DB_USER" -d "$DB_NAME" \
                --no-owner --format=plain | gzip -c > "$$DUMP"
              DEST="$${S3_PREFIX}app-$${STAMP}.sql.gz"
              # Remove barra duplicada se S3_PREFIX estiver vazio
              DEST=$${DEST#/}
              echo "Uploading to s3://$${S3_BUCKET}/$${DEST}"
              aws s3 cp "$$DUMP" "s3://$${S3_BUCKET}/$${DEST}"
              echo "Backup concluído: s3://$${S3_BUCKET}/$${DEST}"
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: gds-secrets
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: gds-secrets
                  key: DB_PASS
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: gds-secrets
                  key: DB_NAME
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: gds-db-backup-s3
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: gds-db-backup-s3
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: gds-db-backup-s3
                  key: AWS_DEFAULT_REGION
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: gds-db-backup-s3
                  key: S3_BUCKET
            - name: S3_PREFIX
              valueFrom:
                secretKeyRef:
                  name: gds-db-backup-s3
                  key: S3_PREFIX
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
